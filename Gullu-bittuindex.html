<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gullu 💌 Bittu Game</title>

<style>
body { margin:0; overflow:hidden; background:#87CEEB; font-family:Arial; }
canvas { display:block; }

.lives { position:absolute; top:10px; left:10px; }
.message { position:absolute; top:10px; right:10px; color:#ff4d6d; }

#startBtn {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:18px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:10px;
  z-index:10;
}

.finalscreen {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:12px;
  display:none;
  text-align:center;
}

button {
  margin-top:10px;
  padding:10px;
  background:#ff4d6d;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="message" id="msg">Press Start 🎮</div>

<button id="startBtn">Start Game 🎮</button>

<canvas id="game"></canvas>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div class="finalscreen" id="finalscreen">
  <h2>💖 Date Unlocked 💖</h2>
  <p>Bittu survived Gullu’s chaos 😌</p>
  <p>🍝 Whatever sir prefers</p>
  <p>😂 Jokes compulsory</p>
  <p>🍨 Ice cream after</p>
  <p>🛍️ Shopping time</p>
  <button id="acceptBtn">Accept Date 💖</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.4;
let player = { x:50, y:300, w:30, h:30, dy:0, jumping:false };

let platforms = [
  {x:100, y:400, w:140, h:10},
  {x:260, y:360, w:140, h:10},
  {x:420, y:320, w:140, h:10},
  {x:580, y:280, w:140, h:10}
];

let started = false;
let loop;

function startGame(){
  if(!started){
    started = true;
    document.getElementById('bgMusic').play().catch(()=>{});
    document.getElementById('startBtn').style.display='none';
    document.getElementById('msg').innerText = "Go Bittu 😏";
    gameLoop();
  }
}

document.getElementById('startBtn').onclick = startGame;

function drawPlayer(){
  ctx.fillStyle = '#ff4d6d';
  ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawPlatforms(){
  ctx.fillStyle = '#654321';
  platforms.forEach(p=>{
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });
}

function update(){
  player.dy += gravity;
  player.y += player.dy;

  platforms.forEach(p=>{
    if(player.x < p.x+p.w && player.x+player.w>p.x &&
       player.y+player.h<p.y+10 && player.y+player.h>p.y){
      player.dy = 0;
      player.y = p.y - player.h;
      player.jumping = false;
    }
  });

  if(player.x > 700){
    document.getElementById('finalscreen').style.display='block';
    cancelAnimationFrame(loop);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlayer();
  drawPlatforms();
}

function gameLoop(){
  update();
  draw();
  loop = requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e=>{
  if(e.code==='Space' && !player.jumping){
    player.dy = -12;
    player.jumping = true;
  }
  if(e.code==='ArrowRight') player.x += 15;
  if(e.code==='ArrowLeft') player.x -= 15;
});

canvas.addEventListener('touchstart', ()=>{
  if(!player.jumping){
    player.dy = -12;
    player.jumping = true;
  }
});

let moved = false;
const btn = document.getElementById('acceptBtn');

btn.addEventListener('mouseover', ()=>{
  if(!moved){
    moved = true;
    btn.style.position = 'relative';
    btn.style.left = (Math.random()*80 - 40)+'px';
  }
});

btn.onclick = ()=>{
  alert("Good choice, Bittu 😌💖");
};
</script>

</body>
</html>
